services:
  postgres:
    image: postgres:16-alpine
    container_name: tdd_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tdd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tdd_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tdd_agentic}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tdd} -d ${POSTGRES_DB:-tdd_agentic}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: tdd_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    container_name: tdd_langfuse
    depends_on:
      langfuse_postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse_postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-please-change-me-in-prod}
      SALT: ${LANGFUSE_SALT:-please-change-me-too}
      NEXTAUTH_URL: http://localhost:3001
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"

  langfuse_postgres:
    image: postgres:16-alpine
    container_name: tdd_langfuse_postgres
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tdd_backend
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      QDRANT_HOST: qdrant
      LANGFUSE_HOST: http://langfuse:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      # Host-visible workspace: every project's generated files land in
      # ./workspace/<project_id>/ on the host, so you can open them in your
      # IDE while agents are working.
      - ./workspace:/app/workspace
    # Hot-reload backend on source edits (like the frontend's `next dev`).
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: tdd_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
      # Docker Desktop on Windows/macOS doesn't propagate inotify events
      # through bind-mounts, so Next.js's file watcher never sees source
      # edits. Fall back to polling — slightly more CPU, but actually
      # detects changes. ``WATCHPACK_POLLING`` is webpack/Next; the
      # ``CHOKIDAR_*`` ones cover the legacy chokidar paths.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    # Mount the source so UI edits hot-reload via `next dev` without
    # rebuilding the image. The anonymous /app/node_modules volume keeps
    # the deps installed inside the image.
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  qdrant_data:
  langfuse_postgres_data:
